# 2024-10-06
blueprint:
  name: Prego - Config Lack of sunlight - By sun prego v0.3
  description: >
    Config - defines the boolean for the lack of light, guided by the sunrise and sunset settings -- lack of sunlight.
    The automation includes optionally features such as preventing activation when away from home and considering stealth mode.
  domain: automation

  #---------------
  # input
  #---------------

  input:
    in_away_from_home:
      name: Are you away from home?
      description: Indicator signaling the absence of occupants at home (travel status).
      default: ''
      selector:
        entity:
          domain: input_boolean
    in_stealth_mode:
      name: Are you in stealth mode?
      description: Indicator signaling that you want to be a ninja in the home (everyone sleeping / suspicious noise).
      default: ''
      selector:
        entity:
          domain: input_boolean
    in_time_morning:
      name: Sunrise Helper
      description: Choose the time helper corresponding to sunrise.
      selector:
        entity:
          integration: input_datetime
          multiple: false
    in_time_night:
      name: Sunset Helper
      description: Choose the time helper corresponding to Sunset.
      selector:
        entity:
          integration: input_datetime
          multiple: false
    in_target_entity_control:
      name: Property to reflect the need for light
      description: Boolean defining Lack of sunlight.
      selector:
        entity:
          domain: input_boolean

  #---------------
  # triggers
  #---------------

  trigger:
    - platform: time
      at:
        - !input in_time_night
        - !input in_time_morning
    - platform: state
      entity_id: !input in_away_from_home
    - platform: state
      entity_id: !input in_stealth_mode

  #---------------
  # conditions
  #---------------

  condition: []

  #---------------
  # actions
  #---------------

  action:
    - choose:
        # Condición cuando está oscuro y no se está en "away from home" ni en "stealth mode"
        - conditions:
            - condition: time
              after: !input in_time_night
              before: !input in_time_morning
            - condition: state
              entity_id: !input in_away_from_home
              state: 'off'
            - condition: state
              entity_id: !input in_stealth_mode
              state: 'off'
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: !input in_target_entity_control

        # Condición cuando está oscuro pero se está en "away from home" o "stealth mode"
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: !input in_away_from_home
                  state: 'on'
                - condition: state
                  entity_id: !input in_stealth_mode
                  state: 'on'
          sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: !input in_target_entity_control

    # Acción predeterminada: apaga el booleano si no hay condiciones activas
    - service: input_boolean.turn_off
      target:
        entity_id: !input in_target_entity_control

  #---------------
  # mode
  #---------------

  mode: single
